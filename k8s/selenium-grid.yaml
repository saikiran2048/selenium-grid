# Plain-YAML equivalent of docker-compose.yml. Apply with:
#   kubectl apply -f k8s/selenium-grid.yaml
#
# Conceptual mapping vs Docker Compose (say this out loud in the interview):
#   docker-compose "service"      -> k8s Deployment (desired state / self-healing) + Service (stable DNS/network)
#   docker-compose "scale"        -> Deployment.spec.replicas (declarative, and a Horizontal Pod
#                                    Autoscaler can adjust it automatically based on load - Compose has no equivalent)
#   docker-compose internal DNS   -> k8s Service DNS (selenium-hub.default.svc.cluster.local)
#   container auto-restart        -> handled by both, but k8s also reschedules a pod onto a
#                                    DIFFERENT node in the cluster if a host dies - Compose
#                                    only restarts on the same single Docker host.
#   single-host network           -> k8s pods can spread across many physical/VM nodes,
#                                    so Grid can scale horizontally past what one machine's
#                                    CPU/RAM can hold for browser sessions.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: selenium-hub
  labels:
    app: selenium-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: selenium-hub
  template:
    metadata:
      labels:
        app: selenium-hub
    spec:
      containers:
        - name: selenium-hub
          image: selenium/hub:4.21.0
          ports:
            - containerPort: 4442
            - containerPort: 4443
            - containerPort: 4444
          readinessProbe:
            httpGet:
              path: /wd/hub/status
              port: 4444
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: selenium-hub
spec:
  selector:
    app: selenium-hub
  ports:
    - name: event-bus-publish
      port: 4442
      targetPort: 4442
    - name: event-bus-subscribe
      port: 4443
      targetPort: 4443
    - name: hub-api
      port: 4444
      targetPort: 4444
  type: ClusterIP   # internal only; use a NodePort/Ingress if Jenkins runs outside the cluster
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chrome-node
spec:
  replicas: 3   # this is the direct analog of `docker compose up --scale chrome-node=3`,
                # except k8s can also auto-scale this via an HPA on CPU/memory metrics
  selector:
    matchLabels:
      app: chrome-node
  template:
    metadata:
      labels:
        app: chrome-node
    spec:
      containers:
        - name: chrome-node
          image: selenium/node-chrome:4.21.0
          env:
            - name: SE_EVENT_BUS_HOST
              value: "selenium-hub"          # resolved via k8s Service DNS, same idea as compose service name
            - name: SE_EVENT_BUS_PUBLISH_PORT
              value: "4442"
            - name: SE_EVENT_BUS_SUBSCRIBE_PORT
              value: "4443"
            - name: SE_NODE_MAX_SESSIONS
              value: "2"
            - name: SE_NODE_OVERRIDE_MAX_SESSIONS
              value: "true"
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firefox-node
spec:
  replicas: 2
  selector:
    matchLabels:
      app: firefox-node
  template:
    metadata:
      labels:
        app: firefox-node
    spec:
      containers:
        - name: firefox-node
          image: selenium/node-firefox:4.21.0
          env:
            - name: SE_EVENT_BUS_HOST
              value: "selenium-hub"
            - name: SE_EVENT_BUS_PUBLISH_PORT
              value: "4442"
            - name: SE_EVENT_BUS_SUBSCRIBE_PORT
              value: "4443"
            - name: SE_NODE_MAX_SESSIONS
              value: "2"
            - name: SE_NODE_OVERRIDE_MAX_SESSIONS
              value: "true"
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
