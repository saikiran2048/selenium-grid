version: "3.9"

# Selenium Grid = 1 Hub (traffic cop) + N Nodes (actual browser workers).
# The Hub receives "new session" requests from RemoteWebDriver, checks each
# node's declared capabilities/capacity, and forwards the session to a free node.
# Nodes register themselves with the Hub over the internal "selenium-grid"
# network using the container name "selenium-hub" as the hostname - that's
# only possible because Docker Compose gives every service DNS resolution
# by service name on the shared network, no manual IP wiring needed.

services:
  selenium-hub:
    image: selenium/hub:4.21.0
    container_name: selenium-hub
    ports:
      - "4442:4442"   # event bus publish
      - "4443:4443"   # event bus subscribe
      - "4444:4444"   # Grid console / RemoteWebDriver endpoint (http://localhost:4444/wd/hub)
    environment:
      - SE_SESSION_REQUEST_TIMEOUT=300
      - SE_SESSION_RETRY_INTERVAL=5
    networks:
      - selenium-grid
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 10s
      timeout: 5s
      retries: 10

  chrome-node:
    image: selenium/node-chrome:4.21.0
    container_name: chrome-node
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2       # how many parallel Chrome sessions this one node will accept
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
    volumes:
      - /dev/shm:/dev/shm            # Chrome crashes under load without this - shares host shared memory
    networks:
      - selenium-grid
    # To run more than 1 chrome-node container, don't hardcode replicas here -
    # `deploy.replicas` is a Swarm-only field and is silently ignored by plain
    # `docker compose up`. Instead scale at runtime:
    #   docker compose up -d --scale chrome-node=3 --scale firefox-node=2

  firefox-node:
    image: selenium/node-firefox:4.21.0
    container_name: firefox-node
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
    volumes:
      - /dev/shm:/dev/shm
    networks:
      - selenium-grid

networks:
  selenium-grid:
    driver: bridge
